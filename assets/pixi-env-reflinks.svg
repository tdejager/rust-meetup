<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <marker id="px-arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#c14a26" />
    </marker>
    <style>
      .box   { fill: #fffff8; stroke: #333; stroke-width: 1.4; }
      .link  { stroke: #c14a26; stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
      .head  { font: "et-book", serif; fill: #111; text-anchor: start; }
      .headc { font: italic 17px "et-book", serif; fill: #111; text-anchor: middle; }
      .mono  { font: 12.5px "IBM Plex Mono", Consolas, monospace; fill: #111; text-anchor: start; }
      .muted { font: 11px "IBM Plex Mono", Consolas, monospace; fill: #555; text-anchor: start; }
      .edge  { font: italic 12px Georgia, "et-book", serif; fill: #c14a26; text-anchor: middle; }
      .pkg   { font: 12px "IBM Plex Mono", Consolas, monospace; fill: #111; text-anchor: middle; }
    </style>
  </defs>

  <!-- default env -->
  <g>
    <rect class="box" x="30" y="60" width="280" height="140" rx="4" />
    <text class="head" x="50" y="88">default/</text>
    <text class="muted" x="50" y="106"># pixi run</text>
    <text class="mono" x="50" y="132">bin/python</text>
    <text class="mono" x="50" y="152">bin/pip</text>
    <text class="mono" x="50" y="172">conda-meta/python-3.14.4…</text>
    <text class="mono" x="50" y="192">lib/python3.14/site-packages/</text>
  </g>

  <!-- test env -->
  <g>
    <rect class="box" x="30" y="320" width="280" height="160" rx="4" />
    <text class="head" x="50" y="348">test/</text>
    <text class="muted" x="50" y="366"># pixi run -e test</text>
    <text class="mono" x="50" y="392">bin/python</text>
    <text class="mono" x="50" y="412">bin/pytest</text>
    <text class="mono" x="50" y="432">bin/pip</text>
    <text class="mono" x="50" y="452">conda-meta/pytest-9.0.3…</text>
    <text class="mono" x="50" y="472">lib/python3.14/site-packages/</text>
  </g>

  <!-- global cache cylinder -->
  <g transform="translate(580, 130)">
    <ellipse class="box" cx="140" cy="10" rx="140" ry="14" />
    <path    class="box" d="M 0 10 L 0 250 A 140 14 0 0 0 280 250 L 280 10" />
    <ellipse class="box" cx="140" cy="10" rx="140" ry="14" />
    <text class="headc" x="140" y="60">global package cache</text>
    <text class="muted" x="80" y="82">~/.cache/rattler/pkgs/</text>

    <!-- python pkg -->
    <rect x="35" y="100" width="210" height="48" rx="3" fill="#f5f5e9" stroke="#888" stroke-width="0.8" />
    <text class="pkg" x="140" y="120">python-3.14.4-h0_0/</text>

    <!-- pytest pkg -->
    <rect x="35" y="170" width="210" height="48" rx="3" fill="#f5f5e9" stroke="#888" stroke-width="0.8" />
    <text class="pkg" x="140" y="190">pytest-9.0.3-py_0/</text>
  </g>

  <!-- arrows: default reflinks python -->
  <path class="link" d="M 310 130 C 450 130 480 230 615 240" marker-end="url(#px-arr)" />
  <text class="edge" x="465" y="170">reflink</text>

  <!-- arrows: test reflinks python -->
  <path class="link" d="M 310 392 C 470 380 500 260 615 250" marker-end="url(#px-arr)" />

  <!-- arrows: test reflinks pytest -->
  <path class="link" d="M 310 430 C 470 430 500 320 615 310" marker-end="url(#px-arr)" />
  <text class="edge" x="475" y="395">reflink</text>

</svg>
