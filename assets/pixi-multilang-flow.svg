<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <marker id="pb-arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#c14a26" />
    </marker>
    <style>
      .box   { fill: #fffff8; stroke: #333; stroke-width: 1.4; }
      .head  { font: italic 15px Georgia, "et-book", serif; fill: #111; text-anchor: middle; }
      .sub   { font: 10.5px "IBM Plex Mono", Consolas, monospace; fill: #555; text-anchor: middle; }
      .edge  { font: italic 12px Georgia, "et-book", serif; fill: #c14a26; text-anchor: middle; }
      .link  { stroke: #c14a26; stroke-width: 1.4; fill: none; }
      .col   { font: italic 12px Georgia, serif; fill: #888; text-anchor: middle; letter-spacing: 0.4px; }
    </style>
  </defs>

  <text class="col" x="120"  y="14">source directory</text>
  <text class="col" x="420"  y="14">build backend</text>
  <text class="col" x="760"  y="14">conda package</text>
  <text class="col" x="1070" y="14">workspace</text>

  <!-- Rust -->
  <g>
    <rect class="box" x="40" y="30" width="160" height="50" rx="4" />
    <text class="head" x="120" y="52">Rust crate</text>
    <text class="sub"  x="120" y="68">Cargo.toml, src/</text>
  </g>
  <g>
    <rect class="box" x="290" y="30" width="260" height="50" rx="4" />
    <text class="head" x="420" y="52">pixi-build-rust</text>
    <text class="sub"  x="420" y="68">cargo build → .conda</text>
  </g>
  <path class="link" d="M 200 55 L 285 55" marker-end="url(#pb-arr)" />

  <!-- C++ -->
  <g>
    <rect class="box" x="40" y="98" width="160" height="50" rx="4" />
    <text class="head" x="120" y="120">C++ project</text>
    <text class="sub"  x="120" y="136">CMakeLists.txt</text>
  </g>
  <g>
    <rect class="box" x="290" y="98" width="260" height="50" rx="4" />
    <text class="head" x="420" y="120">pixi-build-cmake</text>
    <text class="sub"  x="420" y="136">cmake --build → .conda</text>
  </g>
  <path class="link" d="M 200 123 L 285 123" marker-end="url(#pb-arr)" />

  <!-- Python -->
  <g>
    <rect class="box" x="40" y="166" width="160" height="50" rx="4" />
    <text class="head" x="120" y="188">Python package</text>
    <text class="sub"  x="120" y="204">pyproject.toml</text>
  </g>
  <g>
    <rect class="box" x="290" y="166" width="260" height="50" rx="4" />
    <text class="head" x="420" y="188">pixi-build-python</text>
    <text class="sub"  x="420" y="204">PEP 517 wheel → .conda</text>
  </g>
  <path class="link" d="M 200 191 L 285 191" marker-end="url(#pb-arr)" />

  <!-- rattler-build -->
  <g>
    <rect class="box" x="40" y="234" width="160" height="50" rx="4" />
    <text class="head" x="120" y="256">recipe</text>
    <text class="sub"  x="120" y="272">recipe.yaml</text>
  </g>
  <g>
    <rect class="box" x="290" y="234" width="260" height="50" rx="4" />
    <text class="head" x="420" y="256">pixi-build-rattler-build</text>
    <text class="sub"  x="420" y="272">any compiler → .conda</text>
  </g>
  <path class="link" d="M 200 259 L 285 259" marker-end="url(#pb-arr)" />

  <!-- conda hub -->
  <g>
    <rect class="box" x="650" y="115" width="220" height="100" rx="4" />
    <text class="head" x="760" y="150">.conda packages</text>
    <text class="sub"  x="760" y="172">one binary format</text>
    <text class="sub"  x="760" y="190">platform-tagged</text>
  </g>

  <path class="link" d="M 550 55  C 600 55  620 165 645 165" marker-end="url(#pb-arr)" />
  <path class="link" d="M 550 123 C 600 123 620 165 645 165" marker-end="url(#pb-arr)" />
  <path class="link" d="M 550 191 C 600 191 620 165 645 165" marker-end="url(#pb-arr)" />
  <path class="link" d="M 550 259 C 600 259 620 165 645 165" marker-end="url(#pb-arr)" />

  <!-- workspace -->
  <g>
    <rect class="box" x="970" y="115" width="200" height="100" rx="4" />
    <text class="head" x="1070" y="148">pixi workspace</text>
    <text class="sub"  x="1070" y="170">one lockfile</text>
    <text class="sub"  x="1070" y="188">one env per platform</text>
  </g>

  <path class="link" d="M 870 165 L 965 165" marker-end="url(#pb-arr)" />
  <text class="edge" x="918" y="156">resolved by</text>
</svg>
