<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360">
  <defs>
    <marker id="t-arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#c14a26" />
    </marker>
    <style>
      .axis    { stroke: #333; stroke-width: 1.2; fill: none; }
      .tick    { stroke: #333; stroke-width: 1; }
      .year    { font: italic 13px Georgia, "et-book", serif; fill: #555; text-anchor: middle; }
      .box     { fill: #fffff8; stroke: #333; stroke-width: 1.4; }
      .name    { font: italic 18px Georgia, "et-book", serif; fill: #111; text-anchor: middle; }
      .role    { font: 11px "IBM Plex Mono", Consolas, monospace; fill: #555; text-anchor: middle; }
      .when    { font: italic 11px Georgia, "et-book", serif; fill: #c14a26; text-anchor: middle; }
      .link    { stroke: #c14a26; stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
      .edge    { font: italic 11px Georgia, "et-book", serif; fill: #c14a26; text-anchor: middle; }
    </style>
  </defs>

  <!-- timeline axis -->
  <g class="t-axis">
    <line class="axis" x1="80" y1="300" x2="1140" y2="300" />
    <!-- year ticks: 2021, 2022, 2023, 2024 -->
    <line class="tick" x1="120"  y1="295" x2="120"  y2="310" />
    <text class="year" x="120"  y="332">2021</text>
    <line class="tick" x1="380"  y1="295" x2="380"  y2="310" />
    <text class="year" x="380"  y="332">2022</text>
    <line class="tick" x1="640"  y1="295" x2="640"  y2="310" />
    <text class="year" x="640"  y="332">2023</text>
    <line class="tick" x1="900"  y1="295" x2="900"  y2="310" />
    <text class="year" x="900"  y="332">2024</text>
    <line class="tick" x1="1140" y1="295" x2="1140" y2="310" />
    <text class="year" x="1140" y="332">today</text>
  </g>

  <!-- 1. rattler — Nov 2021 (x ≈ 235) -->
  <g class="t-rattler">
    <line class="tick" x1="235" y1="295" x2="235" y2="220" />
    <rect class="box" x="135" y="120" width="200" height="100" rx="4" />
    <text class="name" x="235" y="152">rattler</text>
    <text class="role" x="235" y="174">conda primitives</text>
    <text class="role" x="235" y="190">parsing, install</text>
    <text class="when" x="235" y="240">Nov 2021</text>
  </g>

  <!-- 2. rattler-build — Sep 2022 (x ≈ 480) -->
  <g class="t-rattler-build">
    <line class="tick" x1="480" y1="295" x2="480" y2="220" />
    <rect class="box" x="380" y="120" width="200" height="100" rx="4" />
    <text class="name" x="480" y="152">rattler-build</text>
    <text class="role" x="480" y="174">recipe → .conda</text>
    <text class="role" x="480" y="190">conda-build replacement</text>
    <text class="when" x="480" y="240">Sep 2022</text>
  </g>

  <!-- 3. pixi — Apr 2023 (x ≈ 700) -->
  <g class="t-pixi">
    <line class="tick" x1="700" y1="295" x2="700" y2="220" />
    <rect class="box" x="600" y="120" width="200" height="100" rx="4" />
    <text class="name" x="700" y="152">pixi</text>
    <text class="role" x="700" y="174">user-facing PM</text>
    <text class="role" x="700" y="190">cargo for conda</text>
    <text class="when" x="700" y="240">Apr 2023</text>
  </g>

  <!-- 4. resolvo — Jul 2023 (x ≈ 760) -->
  <g class="t-resolvo">
    <line class="tick" x1="855" y1="295" x2="855" y2="220" />
    <rect class="box" x="820" y="120" width="200" height="100" rx="4" />
    <text class="name" x="920" y="152">resolvo</text>
    <text class="role" x="920" y="174">CDCL SAT solver</text>
    <text class="role" x="920" y="190">extracted from rattler</text>
    <text class="when" x="855" y="240">Jul 2023</text>
  </g>

  <!-- dependency arrows: rattler → rattler-build, rattler → pixi, rattler → resolvo, pixi uses resolvo -->
  <!-- rattler-build builds on rattler -->
  <path class="link" d="M 335 170 L 380 170" marker-end="url(#t-arr)" />
  <text class="edge" x="358" y="160">builds on</text>

  <!-- pixi builds on rattler (curve over rattler-build) -->
  <path class="link" d="M 235 120 C 280 60 600 60 660 120" marker-end="url(#t-arr)" />
  <text class="edge" x="450" y="76">drives</text>

  <!-- pixi uses resolvo (back-arrow short) -->
  <path class="link" d="M 820 170 L 800 170" marker-end="url(#t-arr)" />
  <text class="edge" x="810" y="160">uses</text>

  <!-- resolvo extracted from rattler (long curve high) -->
  <path class="link" d="M 235 120 C 320 30 800 30 920 120" marker-end="url(#t-arr)" />
  <text class="edge" x="600" y="40">extracted</text>
</svg>
